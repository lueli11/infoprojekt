<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temu Reddit – Startseite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #dae0e6;
      color: #1c1c1c;
    }

    /* ─── NAVBAR ─────────────────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #edeff1;
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 18px;
      color: #ff4500;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-logo svg {
      width: 32px;
      height: 32px;
    }

    .nav-search {
      flex: 1;
      max-width: 690px;
      position: relative;
    }

    .nav-search input {
      width: 100%;
      padding: 8px 16px 8px 40px;
      border: 1px solid #edeff1;
      border-radius: 20px;
      background: #f6f7f8;
      font-size: 14px;
      outline: none;
      transition: border-color .15s, background .15s;
    }

    .nav-search input:focus {
      border-color: #0079d3;
      background: #fff;
    }

    .nav-search .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #878a8c;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .btn {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #0079d3;
      color: #0079d3;
    }

    .btn-primary {
      background: #ff4500;
      color: #fff;
    }

    .btn-outline:hover { background: #e8f0fe; }
    .btn-primary:hover { background: #e03d00; }

    /* ─── LAYOUT ──────────────────────────────────────────────── */
    .layout {
      max-width: 740px;
      margin: 24px auto;
      padding: 0 20px;
    }

    /* ─── FEED TABS ───────────────────────────────────────────── */
    .feed-tabs {
      background: #fff;
      border-radius: 4px;
      padding: 10px 12px;
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 2px;
      font-size: 14px;
      font-weight: 700;
      color: #878a8c;
      cursor: pointer;
      border: none;
      background: none;
    }

    .tab:hover, .tab.active { background: #e8e8e8; color: #1c1c1c; }

    /* ─── POST CARD ───────────────────────────────────────────── */
    .post-card {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 10px;
      display: flex;
      cursor: pointer;
      transition: border-color .1s;
    }

    .post-card:hover { border-color: #818384; }

    .vote-col {
      width: 40px;
      background: #f8f9fa;
      border-radius: 4px 0 0 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 4px;
      gap: 4px;
      font-size: 12px;
      font-weight: 700;
      color: #878a8c;
    }

    .vote-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #878a8c;
      padding: 2px 4px;
      border-radius: 2px;
    }

    .vote-btn:hover { color: #ff4500; background: #fee7e0; }

    .post-body {
      flex: 1;
      padding: 8px;
    }

    .post-meta {
      font-size: 12px;
      color: #878a8c;
      margin-bottom: 6px;
    }

    .post-meta .subreddit {
      font-weight: 700;
      color: #1c1c1c;
    }

    .post-meta .subreddit:hover { text-decoration: underline; }

    .post-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .post-flair {
      display: inline-block;
      background: #e8f0fe;
      color: #0079d3;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 12px;
      margin-bottom: 8px;
    }

    .post-image {
      width: 100%;
      max-height: 512px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 8px;
      background: #dae0e6;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #878a8c;
      font-size: 13px;
    }

    .post-actions {
      display: flex;
      gap: 4px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 8px;
      border-radius: 2px;
      font-size: 12px;
      font-weight: 700;
      color: #878a8c;
      cursor: pointer;
      border: none;
      background: none;
    }

    .action-btn:hover { background: #e8e8e8; color: #1c1c1c; }

    /* ─── SIDEBAR ─────────────────────────────────────────────── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .widget {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
    }

    .widget-header {
      background: #ff4500;
      color: #fff;
      padding: 12px;
      font-weight: 700;
      font-size: 14px;
    }

    .widget-header.blue { background: #0079d3; }
    .widget-header.dark { background: #1a1a1b; }

    .widget-body {
      padding: 12px;
    }

    .widget-body p {
      font-size: 14px;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .widget-body .btn {
      width: 100%;
      text-align: center;
      margin-bottom: 8px;
      display: block;
    }

    /* Top Communities */
    .community-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
      font-size: 14px;
      border-bottom: 1px solid #edeff1;
    }

    .community-item:last-child { border-bottom: none; }

    .community-rank {
      font-weight: 700;
      color: #1c1c1c;
      width: 20px;
    }

    .community-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff4500, #ff6534);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .community-name {
      flex: 1;
      font-weight: 500;
    }

    .community-name small {
      display: block;
      color: #878a8c;
      font-size: 11px;
      font-weight: 400;
    }

    .join-btn {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #0079d3;
      color: #0079d3;
      background: transparent;
      cursor: pointer;
    }

    .join-btn:hover { background: #e8f0fe; }

    /* Trending tags */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px;
    }

    .tag {
      background: #f6f7f8;
      border: 1px solid #edeff1;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      color: #1c1c1c;
      cursor: pointer;
    }

    .tag:hover { background: #e8e8e8; }

    /* ─── RESPONSIVE ──────────────────────────────────────────── */
    @media (max-width: 960px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<!-- ── NAVBAR ── -->
<nav>
  <a class="nav-logo" href="#">
    <!-- Reddit-ähnliches Alien-Icon (vereinfacht) -->
    <svg viewBox="0 0 20 20" fill="#ff4500" xmlns="http://www.w3.org/2000/svg">

    </svg>
    Temu Reddit
  </a>


  <div class="nav-actions">
    <button class="btn btn-outline">Anmelden</button>
    <button class="btn btn-primary">Registrieren</button>
  </div>
</nav>

<!-- ── MAIN LAYOUT ── -->
<div class="layout">

  <!-- ── FEED ── -->
  <main>

    <!-- Post 1 – mit Bild -->
    <article class="post-card">
      <div class="post-body">
        <div class="post-meta">
          <span class="subreddit">r/Technologie</span>
          &nbsp;• gepostet von u/jonas_dev
        </div>
        <h2 class="post-title">Neues Vue 4 Release: Was ändert sich für Entwickler?</h2>
        <div class="post-image">[ Beitragsbild / Vorschau ]</div>
        <div class="post-actions">
          <button class="action-btn">💬 234 Kommentare</button>
        </div>
      </div>
    </article>

    <!-- Post 2 – nur Text -->
    <article class="post-card">
      <div class="post-body">
        <div class="post-meta">
          <span class="subreddit">r/Schweiz</span>
          &nbsp;• gepostet von u/naeljörg
        </div>
        <h2 class="post-title">Beste Wanderwege im Berner Oberland – eure Empfehlungen?</h2>
        <div class="post-actions">
          <button class="action-btn">💬 89 Kommentare</button>
        </div>
      </div>
    </article>

    

  </main>

  

  </aside>
</div>

</body>
</html>
