<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #1e2530;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      color: #fff;
    }

    /* ── Navbar ── */
    .navbar {
		position: sticky;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background-color: #252d3a;
      border-radius: 0 0 16px 16px;
      border-bottom: 1px solid #2e3848;
    }

    .logo {
      width: 72px;
      height: 60px;
    }

    /* fried-egg SVG logo */
    .auth-btn {
      display: flex;
      align-items: center;
      background: linear-gradient(135deg, #f0a030, #e08820);
      border: none;
      border-radius: 999px;
      padding: 10px 6px;
      cursor: pointer;
      gap: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .auth-btn span {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 0 14px;
      white-space: nowrap;
    }

    .auth-btn .divider {
      width: 1px;
      height: 18px;
      background: rgba(255,255,255,0.5);
      padding: 0;
    }

    /* ── Main content ── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Card ── */
    .card {
      background-color: #2a3340;
      border-radius: 20px;
      border: 1px solid #323d4d;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .card-header {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background-color: #303b4a;
      border-bottom: 1px solid #3a4555;
      gap: 16px;
      border-radius: 20px 20px 0 0;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #c8cdd5;
      flex-shrink: 0;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 2px 6px rgba(0,0,0,0.3);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #d0d8e4;
    }

    .card-subtitle {
      font-size: 13px;
      color: #7a8899;
      margin-top: 3px;
    }

    .card-body {
      padding: 20px;
      min-height: 120px;
      color: #7a8899;
      font-size: 14px;
      line-height: 1.6;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .navbar {
        padding: 10px 16px;
      }

      .auth-btn span {
        font-size: 13px;
        padding: 0 10px;
      }

      .main {
        padding: 20px 12px;
        gap: 16px;
      }

      .card-header {
        padding: 14px 16px;
      }

      .avatar {
        width: 42px;
        height: 42px;
      }

      .card-title {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Navbar -->
    <nav class="navbar">
      <!-- Fried egg logo as inline SVG -->
      <svg class="logo" viewBox="0 0 80 50" xmlns="http://www.w3.org/2000/svg">
        <!-- egg white (ellipse, slightly tilted) -->
        <ellipse cx="38" cy="30" rx="34" ry="16" fill="#e8e8e8" />
        <!-- yolk -->
        <circle cx="32" cy="25" r="14" fill="#f0a030" />
      </svg>

      <!-- Register | Login button -->
      <button class="auth-btn" @click="handleAuth">
        <span>Register</span>
        <span class="divider"></span>
        <span>Login</span>
      </button>
    </nav>

    <!-- Item list -->
    <main class="main">
      <div class="card" v-for="item in items" :key="item.id">
        <div class="card-header">
          <div class="avatar"></div>
          <div>
            <div class="card-title">{{ item.title }}</div>
            <div class="card-subtitle">{{ item.subtitle }}</div>
          </div>
        </div>
        <div class="card-body">
          {{ item.description }}
        </div>
      </div>
    </main>
  </div>

  <script>
    const { createApp } = Vue

    createApp({
      data() {
        return {
          items: [
            {
              id: 1,
              title: 'Eintrag Nummer Eins',
              subtitle: 'Erstellt am 22. Mai 2026',
              description: 'Dies ist die Beschreibung des ersten Eintrags. Hier können beliebige Inhalte angezeigt werden.',
            },
            {
              id: 2,
              title: 'Eintrag Nummer Zwei',
              subtitle: 'Erstellt am 21. Mai 2026',
              description: 'Hier steht der Inhalt des zweiten Eintrags. Die Liste wird dynamisch mit Vue.js gerendert.',
            },
            {
              id: 3,
              title: 'Eintrag Nummer Drei',
              subtitle: 'Erstellt am 20. Mai 2026',
              description: 'Ein weiterer Eintrag in der Liste. Das Design passt sich auf kleinen Bildschirmen automatisch an.',
            },
          ]
        }
      },
      methods: {
        handleAuth() {
          alert('Auth-Aktion ausgelöst')
        }
      }
    }).mount('#app')
  </script>
</body>
</html>
